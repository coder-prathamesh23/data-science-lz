trigger: none
pr: none

parameters:
  - name: action
    displayName: Terraform action
    type: string
    default: plan
    values: [plan, apply]

  - name: stackPath
    displayName: Stack path
    type: string
    default: stacks/data-science-lz-core

  - name: terraformVersion
    displayName: Terraform version
    type: string
    default: 1.7.5

variables:
  # Environment-specific settings.
  # For a different environment, update the variable group plus the two values below.
  - group: DATA_SCIENCE_LZ_DEV

  - name: DEPLOY_ENV
    value: dev

  - name: AZDO_ENVIRONMENT
    value: data-science-lz-dev

  - name: TF_IN_AUTOMATION
    value: "true"

pool:
  name: azumanage-flz

stages:
  # ------------------------------
  # 1) Fmt + Validate (always)
  # ------------------------------
  - stage: Validate
    displayName: Fmt + Validate
    jobs:
      - job: Validate
        displayName: Validate
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail
              if ! command -v unzip >/dev/null 2>&1; then
                echo "Installing unzip..."
                sudo apt-get update
                sudo apt-get install -y unzip
              fi
            displayName: Ensure unzip is installed

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: ${{ parameters.terraformVersion }}

          - bash: |
              set -euo pipefail
              terraform version

              STACK_PATH="${{ parameters.stackPath }}"
              STACK_PATH="${STACK_PATH#/}"
              STACK_PATH="${STACK_PATH%/}"

              if [ -z "$STACK_PATH" ]; then
                echo "ERROR: stackPath cannot be empty."
                exit 1
              fi

              if [ ! -d "$STACK_PATH" ]; then
                echo "ERROR: stackPath '$STACK_PATH' does not exist in the repo."
                exit 1
              fi

              echo "==> terraform fmt (check only)"
              terraform fmt -check -diff -recursive

              echo "==> terraform init/validate (no backend)"
              cd "$STACK_PATH"
              terraform init -backend=false -input=false -no-color
              terraform validate -no-color
            displayName: terraform fmt + validate

  # ------------------------------
  # 2) Plan (always)
  # ------------------------------
  - stage: Plan
    displayName: Terraform Plan
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: Plan
        displayName: Plan
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail
              if ! command -v unzip >/dev/null 2>&1; then
                echo "Installing unzip..."
                sudo apt-get update
                sudo apt-get install -y unzip
              fi
            displayName: Ensure unzip is installed

          - bash: |
              set -euo pipefail
              if ! command -v az >/dev/null 2>&1; then
                echo "Azure CLI not found. Installing..."
                curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
              fi
              az --version
            displayName: Ensure Azure CLI is installed

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: ${{ parameters.terraformVersion }}

          - task: AzureCLI@2
            displayName: terraform init + plan
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail
                terraform version

                : "${AZURE_SERVICE_CONNECTION:?AZURE_SERVICE_CONNECTION is required (variable group)}"
                : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"
                : "${DEPLOY_ENV:?DEPLOY_ENV is required}"

                STACK_PATH="${{ parameters.stackPath }}"
                STACK_PATH="${STACK_PATH#/}"
                STACK_PATH="${STACK_PATH%/}"

                if [ -z "$STACK_PATH" ]; then
                  echo "ERROR: stackPath cannot be empty."
                  exit 1
                fi

                if [ ! -d "$STACK_PATH" ]; then
                  echo "ERROR: stackPath '$STACK_PATH' does not exist in the repo."
                  exit 1
                fi

                cd "$STACK_PATH"

                if [ ! -f "terraform.tfvars" ]; then
                  echo "ERROR: terraform.tfvars not found in $PWD"
                  exit 1
                fi

                KEY_OVERRIDE="${TF_BACKEND_KEY:-}"
                if [ -n "$KEY_OVERRIDE" ]; then
                  key="$KEY_OVERRIDE"
                else
                  key="$DEPLOY_ENV/$STACK_PATH/terraform.tfstate"
                fi
                echo "Using backend key: $key"

                ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
                ARM_CLIENT_ID="${servicePrincipalId:-}"
                export ARM_SUBSCRIPTION_ID ARM_TENANT_ID ARM_CLIENT_ID
                export ARM_USE_CLI=false

                if [ -n "${servicePrincipalKey:-}" ]; then
                  export ARM_CLIENT_SECRET="$servicePrincipalKey"
                elif [ -n "${idToken:-}" ]; then
                  export ARM_USE_OIDC=true
                  export ARM_OIDC_TOKEN="$idToken"
                else
                  echo "ERROR: AzureCLI@2 did not expose servicePrincipalKey or idToken. Ensure addSpnToEnvironment: true and the service connection auth type is SPN or Workload Identity."
                  exit 1
                fi

                terraform init -input=false -no-color \
                  -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=${key}" \
                  -backend-config="use_azuread_auth=true"

                terraform validate -no-color
                terraform plan -no-color -var-file="terraform.tfvars" -out="$(Build.ArtifactStagingDirectory)/tfplan"
                terraform show -no-color "$(Build.ArtifactStagingDirectory)/tfplan" > "$(Build.ArtifactStagingDirectory)/tfplan.txt"

                if [ -f ".terraform.lock.hcl" ]; then
                  cp .terraform.lock.hcl "$(Build.ArtifactStagingDirectory)/"
                fi

          - publish: "$(Build.ArtifactStagingDirectory)"
            artifact: tfplan
            displayName: Publish tfplan artifact

  # --------------------------------------------------------
  # 3) Apply (only when action=apply, requires approval)
  # --------------------------------------------------------
  - stage: Apply
    displayName: Terraform Apply (Requires Approval)
    dependsOn: Plan
    condition: >
      and(
        succeeded(),
        eq('${{ parameters.action }}', 'apply')
      )
    jobs:
      - deployment: Apply
        displayName: Apply
        environment: ${{ variables.AZDO_ENVIRONMENT }}
        pool:
          name: azumanage-flz
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - bash: |
                    set -euo pipefail
                    if ! command -v unzip >/dev/null 2>&1; then
                      echo "Installing unzip..."
                      sudo apt-get update
                      sudo apt-get install -y unzip
                    fi
                  displayName: Ensure unzip is installed

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: ${{ parameters.terraformVersion }}

                - download: current
                  artifact: tfplan
                  displayName: Download tfplan artifact

                - bash: |
                    set -euo pipefail
                    if ! command -v az >/dev/null 2>&1; then
                      echo "Azure CLI not found. Installing..."
                      curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
                    fi
                    az --version
                  displayName: Ensure Azure CLI is installed

                - task: AzureCLI@2
                  displayName: terraform init + apply (from saved plan)
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail
                      terraform version

                      : "${AZURE_SERVICE_CONNECTION:?AZURE_SERVICE_CONNECTION is required (variable group)}"
                      : "${TF_BACKEND_RG:?TF_BACKEND_RG is required}"
                      : "${TF_BACKEND_STORAGE:?TF_BACKEND_STORAGE is required}"
                      : "${TF_BACKEND_CONTAINER:?TF_BACKEND_CONTAINER is required}"
                      : "${DEPLOY_ENV:?DEPLOY_ENV is required}"

                      STACK_PATH="${{ parameters.stackPath }}"
                      STACK_PATH="${STACK_PATH#/}"
                      STACK_PATH="${STACK_PATH%/}"

                      if [ -z "$STACK_PATH" ]; then
                        echo "ERROR: stackPath cannot be empty."
                        exit 1
                      fi

                      if [ ! -d "$STACK_PATH" ]; then
                        echo "ERROR: stackPath '$STACK_PATH' does not exist in the repo."
                        exit 1
                      fi

                      if [ -n "${AML_WORKSPACE_RG:-}" ] && [ -n "${AML_WORKSPACE_NAME:-}" ]; then
                        az extension add -n ml -y || az extension update -n ml
                        az ml workspace provision-network \
                          -g "$AML_WORKSPACE_RG" \
                          -n "$AML_WORKSPACE_NAME"
                      fi

                      if [ -f "$(Pipeline.Workspace)/tfplan/.terraform.lock.hcl" ]; then
                        cp "$(Pipeline.Workspace)/tfplan/.terraform.lock.hcl" "$STACK_PATH/.terraform.lock.hcl"
                      fi

                      cd "$STACK_PATH"

                      KEY_OVERRIDE="${TF_BACKEND_KEY:-}"
                      if [ -n "$KEY_OVERRIDE" ]; then
                        key="$KEY_OVERRIDE"
                      else
                        key="$DEPLOY_ENV/$STACK_PATH/terraform.tfstate"
                      fi
                      echo "Using backend key: $key"

                      ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      ARM_TENANT_ID="$(az account show --query tenantId -o tsv)"
                      ARM_CLIENT_ID="${servicePrincipalId:-}"
                      export ARM_SUBSCRIPTION_ID ARM_TENANT_ID ARM_CLIENT_ID
                      export ARM_USE_CLI=false

                      if [ -n "${servicePrincipalKey:-}" ]; then
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      elif [ -n "${idToken:-}" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        echo "ERROR: AzureCLI@2 did not expose servicePrincipalKey or idToken. Ensure addSpnToEnvironment: true and the service connection auth type is SPN or Workload Identity."
                        exit 1
                      fi

                      terraform init -input=false -no-color \
                        -backend-config="resource_group_name=${TF_BACKEND_RG}" \
                        -backend-config="storage_account_name=${TF_BACKEND_STORAGE}" \
                        -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                        -backend-config="key=${key}" \
                        -backend-config="use_azuread_auth=true"

                      terraform apply -no-color -auto-approve "$(Pipeline.Workspace)/tfplan/tfplan"